          - paragraph [ref=e353]: 04 · Can the home pool support the system?
          - heading "Each state has a graduating class. Its colleges have an entering-class requirement." [level=2] [ref=e354]
        - paragraph [ref=e355]: The relevant comparison is annual first-time four-year intake—not total enrollment. The completed IPEDS layer separates students supplied by the state, imported from other states, and arriving from abroad.
