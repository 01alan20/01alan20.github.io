          - paragraph [ref=e412]: 07 · Test the competition assumption
          - heading "Did institutions actually hold, gain or lose market share?" [level=2] [ref=e413]
        - paragraph [ref=e414]: The backtest applies each institution’s prior share of its state’s first-time market to the next observed IPEDS residence cycle, then compares that baseline with actual intake.
