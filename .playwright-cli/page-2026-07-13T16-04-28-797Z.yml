    - generic [ref=e382]:
      - generic [ref=e383]:
        - generic [ref=e384]:
          - paragraph [ref=e385]: 05 · Competition distributes the losses
          - heading "A state decline is not an institution forecast." [level=2] [ref=e386]
        - paragraph [ref=e387]: Some colleges can reach beyond their local market or take share from competitors. Others are tied to a shrinking regional pool. The model therefore separates four dimensions rather than assigning every institution the same percentage loss.
      - generic [ref=e388]:
        - article [ref=e389]:
          - text: "01"
          - heading "Market strength" [level=3] [ref=e390]
          - paragraph [ref=e391]: Applications, selectivity, yield, retention and recent enrollment momentum.
        - article [ref=e392]:
          - text: "02"
          - heading "Recruitment reach" [level=3] [ref=e393]
          - paragraph [ref=e394]: Local, statewide, national, online, graduate and international recruitment channels.
        - article [ref=e395]:
          - text: "03"
          - heading "Demographic exposure" [level=3] [ref=e396]
          - paragraph [ref=e397]: Dependence on first-time traditional undergraduates in shrinking markets.
        - article [ref=e398]:
          - text: "04"
          - heading "Financial resilience" [level=3] [ref=e399]
          - paragraph [ref=e400]: Tuition dependence, operating flexibility, reserves, debt and public funding.
