      - paragraph [ref=e16]: U.S. higher education through 2041
      - heading [level=1] [ref=e17]:
        - text: The Enrollment
        - emphasis [ref=e18]: Squeeze
      - paragraph [ref=e19]: A smaller domestic pipeline. A weaker flow of new international students. And institutions with very different abilities to compete, adapt and absorb the financial pressure.
