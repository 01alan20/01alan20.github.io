      - link "Follow the story ↓" [ref=e30] [cursor=pointer]:
        - /url: "#trend"
    - generic [ref=e31]:
      - paragraph [ref=e32]: The central question
      - heading "What happens when the number of students falls, but the number of institutions competing for them does not?" [level=2] [ref=e33]
      - paragraph [ref=e34]: The demographic change has been visible for years. The harder problem is how the losses will be distributed—and which institutions have enough demand, reach and financial flexibility to withstand them.
